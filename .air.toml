root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main.exe ./cmd/api"
  bin = "./tmp/main.exe"
  delay = 1000
  exclude_dir = ["web", "data", "tmp", "uploads", "context"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "sql"]
  kill_delay = "2s"

[log]
  time = true

[misc]
  clean_on_exit = true
